spring:
  application:
    name: vietskin-backend

  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:immortal-jaybird-137879.upstash.io}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true

  docker:
    compose:
      enabled: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/vietskin?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: root
    password: "123456"
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080

app:
  cors:
    allowed-origin: ${CORS_ORIGIN:http://localhost:5173}

jwt:
  secret: ${JWT_ACCESS_SECRET:vietskin-access-secret-key-must-be-32chars}
  refresh-secret: ${JWT_REFRESH_SECRET:vietskin-refresh-secret-key-must-be-32chars}
  access-token-expiry: 900       # 15 phút
  refresh-token-expiry: 604800   # 7 ngày


cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:dqbzw0jb2}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

# Chatbot AI — Groq (OpenAI-compatible, miễn phí)
# Ưu tiên đọc biến môi trường GROQ_API_KEY.
groq:
  api-key: ${GROQ_API_KEY}
  base-url: https://api.groq.com/openai/v1
  model: ${GROQ_MODEL:llama-3.3-70b-versatile}
